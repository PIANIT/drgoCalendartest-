<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>DRGO 위키</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@400;600;700&family=Gothic+A1:wght@400;700&family=Nanum+Gothic:wght@400;700&family=Nanum+Myeongjo&display=swap" rel="stylesheet">
<style>
:root {
  --font-main:"Malgun Gothic","맑은 고딕",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  --font-mono:'DM Mono',"Malgun Gothic","맑은 고딕",monospace;
  --bg:#111111; --surface:#1c1c1c; --surface2:#272727;
  --border:#3a3a3a; --accent:#d4bc96; --accent2:#90bcd4;
  --text:#f0ebe2; --text-muted:#a09890;
  --red:#d48888; --green:#88d488; --purple:#b88dd4;
}
html.light {
  --bg:#f7f4f0; --surface:#ffffff; --surface2:#efebe4;
  --border:#d8d0c4; --accent:#9c7d48; --accent2:#3a7a9a;
  --text:#1e1812; --text-muted:#7a6e60; --red:#a84444; --green:#3a8a3a; --purple:#8a4aaa;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--font-main); height:100vh; overflow:hidden; display:flex; flex-direction:column; }

/* ── LOGIN OVERLAY ── */
#loginOverlay {
  display:none; position:fixed; inset:0; z-index:9000;
  background:rgba(0,0,0,.75); backdrop-filter:blur(6px);
  align-items:center; justify-content:center;
}
#loginOverlay.show { display:flex; }
.login-box {
  background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:36px 40px; width:320px;
  display:flex; flex-direction:column; gap:14px;
  box-shadow:0 24px 64px rgba(0,0,0,.7);
}
.login-title {
  font-family:var(--font-mono); font-size:13px; letter-spacing:.18em;
  color:var(--accent); text-align:center; margin-bottom:4px;
}
.login-input {
  width:100%; height:42px; padding:0 14px;
  background:var(--surface2); border:1.5px solid var(--border);
  border-radius:8px; color:var(--text); font-size:14px;
  font-family:var(--font-main); outline:none; transition:border-color .2s;
}
.login-input:focus { border-color:var(--accent); }
.login-input::placeholder { color:var(--text-muted); }
.login-err { font-size:12px; color:var(--red); text-align:center; min-height:16px; }
.login-btn {
  height:42px; background:var(--accent); color:#1a1207;
  border:none; border-radius:8px; font-size:14px; font-weight:700;
  font-family:var(--font-main); cursor:pointer; transition:opacity .15s;
}
.login-btn:hover { opacity:.85; }
.login-btn:disabled { opacity:.5; cursor:not-allowed; }

/* ── HEADER ── */
#wikiHeader {
  height:50px; flex-shrink:0; position:relative; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; border-bottom:1px solid var(--border); background:var(--surface);
}
.wiki-title { font-family:var(--font-mono); font-size:13px; letter-spacing:.18em; color:var(--accent); display:flex; align-items:center; gap:8px; }
.header-right { display:flex; align-items:center; gap:8px; }
.hdr-btn { background:none; border:1px solid var(--border); color:var(--text-muted); cursor:pointer; height:30px; padding:0 12px; border-radius:6px; font-size:12px; font-family:var(--font-main); display:flex; align-items:center; gap:5px; transition:all .18s; white-space:nowrap; }
.hdr-btn:hover { border-color:var(--accent); color:var(--accent); }
.hdr-btn.primary { background:var(--accent); color:#1a1207; border-color:var(--accent); font-weight:700; }
.hdr-btn.primary:hover { background:#dcc8a4; }
#searchInput { height:30px; padding:0 12px; border-radius:6px; background:var(--surface2); border:1px solid var(--border); color:var(--text); font-size:12px; font-family:var(--font-main); outline:none; width:200px; transition:border-color .2s; }
#searchInput:focus { border-color:var(--accent); }
#searchInput::placeholder { color:var(--text-muted); }
#userBadge {
  display:none; align-items:center; gap:5px;
  padding:4px 10px; background:var(--surface2);
  border:1px solid var(--border); border-radius:20px;
  font-size:11px; color:var(--text-muted);
}
#userBadge .badge-name { color:var(--accent); font-weight:500; }

/* ── LAYOUT ── */
#layout { flex:1; display:flex; overflow:hidden; }

/* ── SIDEBAR ── */
#sidebar { width:260px; flex-shrink:0; border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; background:var(--surface); }
.sidebar-section-header { padding:10px 16px 6px; font-size:10px; letter-spacing:.14em; color:var(--text-muted); font-family:var(--font-mono); text-transform:uppercase; border-bottom:1px solid var(--border); }
#articleList { flex:1; overflow-y:auto; padding:6px; }
#articleList::-webkit-scrollbar { width:4px; }
#articleList::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
.article-item { display:flex; align-items:flex-start; gap:8px; padding:9px 10px; border-radius:7px; cursor:pointer; transition:background .13s; border:1px solid transparent; }
.article-item:hover { background:var(--surface2); }
.article-item.active { background:rgba(212,188,150,.10); border-color:rgba(212,188,150,.2); }
.article-item-icon { font-size:14px; flex-shrink:0; margin-top:1px; }
.article-item-body { flex:1; min-width:0; }
.article-item-title { font-size:12px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.article-item.active .article-item-title { color:var(--accent); }
.article-item-meta { font-size:10px; color:var(--text-muted); margin-top:2px; }
.article-item-cat { display:inline-block; font-size:9px; padding:1px 6px; border-radius:3px; background:rgba(144,188,212,.15); color:var(--accent2); font-family:var(--font-mono); letter-spacing:.06em; margin-bottom:2px; }
.empty-list { padding:32px 16px; text-align:center; color:var(--text-muted); font-size:12px; line-height:1.6; }

/* ── MAIN ── */
#mainArea { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
#wikiWelcome { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--text-muted); }
.welcome-big { font-family:var(--font-mono); font-size:32px; letter-spacing:.2em; color:var(--accent); opacity:.5; }
.welcome-desc { font-size:13px; }
#articleView { display:none; flex:1; flex-direction:column; overflow:hidden; }
#articleView.show { display:flex; }
.article-view-header { padding:20px 32px 14px; border-bottom:1px solid var(--border); background:var(--surface); flex-shrink:0; }
.article-view-category { font-size:10px; font-family:var(--font-mono); letter-spacing:.12em; color:var(--accent2); text-transform:uppercase; margin-bottom:6px; }
.article-view-title { font-size:20px; font-weight:700; color:var(--text); line-height:1.3; }
.article-view-meta { margin-top:6px; font-size:11px; color:var(--text-muted); display:flex; align-items:center; gap:12px; }
.article-view-actions { margin-top:10px; display:flex; gap:6px; }
.article-view-body { flex:1; overflow-y:auto; padding:28px 32px; line-height:1.8; font-size:14px; }
.article-view-body::-webkit-scrollbar { width:5px; }
.article-view-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.article-view-body img { max-width:100%; height:auto; border-radius:8px; border:1px solid var(--border); margin:12px 0; }
.article-view-body h1 { font-size:22px; font-weight:700; margin:20px 0 10px; border-bottom:2px solid var(--border); padding-bottom:6px; }
.article-view-body h2 { font-size:18px; font-weight:700; margin:18px 0 8px; }
.article-view-body h3 { font-size:15px; font-weight:600; margin:14px 0 6px; }
.article-view-body ul,.article-view-body ol { padding-left:24px; margin:8px 0; }
.article-view-body li { margin:3px 0; }
.article-view-body hr { border:none; border-top:1px solid var(--border); margin:16px 0; }
.article-view-body blockquote { border-left:3px solid var(--accent); padding:8px 16px; margin:12px 0; background:rgba(212,188,150,.06); border-radius:0 6px 6px 0; color:var(--text-muted); }
.article-view-body table { border-collapse:collapse; width:100%; margin:12px 0; }
.article-view-body td,.article-view-body th { border:1px solid var(--border); padding:8px 12px; font-size:13px; }
.article-view-body th { background:var(--surface2); font-weight:600; }
.article-view-body a { color:var(--accent2); text-decoration:underline; }
.article-view-body code { background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:1px 6px; font-family:var(--font-mono); font-size:12px; }
.article-view-body pre { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:14px; margin:12px 0; overflow-x:auto; white-space:pre-wrap; }

/* ── MODAL ── */
.modal-backdrop { display:none; position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,.65); backdrop-filter:blur(4px); align-items:center; justify-content:center; }
.modal-backdrop.open { display:flex; }
.modal-box { background:var(--surface); border:1px solid var(--border); border-radius:14px; box-shadow:0 24px 64px rgba(0,0,0,.5); width:95%; max-width:980px; max-height:95vh; display:flex; flex-direction:column; overflow:hidden; }
.modal-header { padding:16px 20px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.modal-title { font-size:15px; font-weight:700; color:var(--text); }
.modal-close { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:20px; width:30px; height:30px; display:flex; align-items:center; justify-content:center; border-radius:6px; transition:all .15s; line-height:1; }
.modal-close:hover { background:rgba(212,136,136,.2); color:var(--red); }
.modal-body { flex:1; overflow-y:auto; padding:16px 20px; }
.modal-body::-webkit-scrollbar { width:5px; }
.modal-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.modal-footer { padding:12px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; flex-shrink:0; }
.form-row { margin-bottom:12px; }
.form-label { display:block; font-size:10px; font-family:var(--font-mono); letter-spacing:.12em; color:var(--text-muted); margin-bottom:5px; text-transform:uppercase; }
.form-input,.form-select { width:100%; padding:8px 12px; font-size:13px; background:var(--surface2); border:1.5px solid var(--border); border-radius:8px; color:var(--text); font-family:var(--font-main); outline:none; transition:border-color .2s; }
.form-input:focus,.form-select:focus { border-color:var(--accent); }
.form-select option { background:var(--surface); }
.cat-chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
.cat-chip { padding:4px 10px; border-radius:12px; font-size:11px; border:1px solid var(--border); cursor:pointer; transition:all .15s; color:var(--text-muted); background:none; font-family:var(--font-main); }
.cat-chip.selected { background:rgba(212,188,150,.15); border-color:var(--accent); color:var(--accent); }

/* ── TOOLBAR ── */
#editorToolbar {
  display:flex; align-items:center; gap:2px; flex-wrap:wrap;
  padding:6px 8px; background:var(--surface);
  border:1.5px solid var(--border); border-bottom:none;
  border-radius:8px 8px 0 0; row-gap:4px;
}
.tb {
  background:none; border:1px solid transparent; color:var(--text-muted);
  cursor:pointer; padding:0 6px; border-radius:4px; font-size:12px;
  font-family:var(--font-main); transition:all .12s;
  display:flex; align-items:center; justify-content:center;
  height:26px; min-width:26px; white-space:nowrap; flex-shrink:0;
  position:relative;
}
.tb:hover { background:var(--surface2); color:var(--text); }
.tb.act { background:rgba(212,188,150,.18); color:var(--accent); border-color:rgba(212,188,150,.3); }
.tb-sep { width:1px; height:18px; background:var(--border); margin:0 3px; flex-shrink:0; align-self:center; }
.tb[title]:hover::after {
  content:attr(title); position:absolute; top:calc(100% + 5px); left:50%; transform:translateX(-50%);
  background:#000; color:#fff; font-size:10px; padding:3px 7px; border-radius:4px;
  white-space:nowrap; pointer-events:none; z-index:9999; border:1px solid #333;
}
.tb-sel {
  height:26px; padding:0 5px; border-radius:4px;
  background:var(--surface2); border:1px solid var(--border);
  color:var(--text); font-size:11px; font-family:var(--font-main);
  outline:none; cursor:pointer; flex-shrink:0; transition:border-color .15s;
}
.tb-sel:hover,.tb-sel:focus { border-color:var(--accent); }
.tb-sel option { background:var(--surface); }
#fontSizeInput {
  width:42px; height:26px; padding:0 5px; border-radius:4px;
  background:var(--surface2); border:1px solid var(--border);
  color:var(--text); font-size:11px; font-family:var(--font-main);
  outline:none; text-align:center; flex-shrink:0;
}
#fontSizeInput:hover,#fontSizeInput:focus { border-color:var(--accent); }
.tb-color-btn {
  position:relative; height:26px; width:30px; border-radius:4px;
  border:1px solid var(--border); cursor:pointer; overflow:hidden;
  flex-shrink:0; background:var(--surface2); display:flex;
  flex-direction:column; align-items:center; justify-content:center; gap:1px;
}
.tb-color-btn:hover { border-color:var(--accent); }
.tb-color-btn input[type=color] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.tb-color-bar { position:absolute; bottom:2px; left:3px; right:3px; height:3px; border-radius:2px; pointer-events:none; }
.tb-color-letter { font-size:11px; font-weight:700; pointer-events:none; line-height:1; margin-top:1px; }

/* ── EDITOR ── */
#articleEditor {
  width:100%; min-height:400px; max-height:52vh;
  padding:16px; font-size:14px; line-height:1.8;
  background:var(--surface2); border:1.5px solid var(--border);
  border-top:none; border-radius:0 0 8px 8px;
  color:var(--text); font-family:var(--font-main);
  outline:none; overflow-y:auto;
}
#articleEditor:focus { border-color:var(--accent); }
#articleEditor:empty:before { content:attr(data-placeholder); color:var(--text-muted); pointer-events:none; }
#articleEditor h1 { font-size:22px; font-weight:700; margin:16px 0 8px; border-bottom:2px solid var(--border); padding-bottom:6px; }
#articleEditor h2 { font-size:18px; font-weight:700; margin:14px 0 6px; }
#articleEditor h3 { font-size:15px; font-weight:600; margin:10px 0 4px; }
#articleEditor ul,#articleEditor ol { padding-left:24px; margin:6px 0; }
#articleEditor blockquote { border-left:3px solid var(--accent); padding:8px 16px; margin:10px 0; background:rgba(212,188,150,.06); border-radius:0 6px 6px 0; color:var(--text-muted); }
#articleEditor hr { border:none; border-top:1px solid var(--border); margin:14px 0; }
#articleEditor table { border-collapse:collapse; margin:10px 0; width:100%; }
#articleEditor td,#articleEditor th { border:1px solid var(--border); padding:7px 10px; font-size:13px; min-width:60px; }
#articleEditor th { background:rgba(212,188,150,.12); font-weight:600; }
#articleEditor a { color:var(--accent2); text-decoration:underline; }
#articleEditor::-webkit-scrollbar { width:5px; }
#articleEditor::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
#articleEditor img { max-width:100%; height:auto; border-radius:6px; border:2px solid transparent; display:block; margin:8px 0; cursor:pointer; transition:border-color .15s; }
#articleEditor img.img-sel { border-color:var(--accent2); }

/* 이미지 드래그 리사이즈 래퍼 */
.img-resize-wrapper { display:inline-block; position:relative; max-width:100%; line-height:0; vertical-align:top; }
.img-resize-wrapper img { display:block; width:100%; height:auto; }
.img-resize-wrapper.selected img { border-color:var(--accent2); }
.resize-handle { position:absolute; width:10px; height:10px; background:var(--accent2); border:2px solid #fff; border-radius:2px; z-index:10; display:none; }
.img-resize-wrapper.selected .resize-handle { display:block; }
.resize-handle.se { right:-5px; bottom:-5px; cursor:se-resize; }
.resize-handle.sw { left:-5px; bottom:-5px; cursor:sw-resize; }
.resize-handle.ne { right:-5px; top:-5px; cursor:ne-resize; }
.resize-handle.nw { left:-5px; top:-5px; cursor:nw-resize; }

/* ── 표 컨텍스트 메뉴 ── */
#tableCtxMenu { display:none; position:fixed; z-index:3000; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:4px; box-shadow:0 8px 28px rgba(0,0,0,.5); min-width:160px; }
#tableCtxMenu.show { display:block; }
.ctx-item { padding:7px 12px; font-size:12px; cursor:pointer; border-radius:5px; color:var(--text); display:flex; align-items:center; gap:8px; }
.ctx-item:hover { background:var(--surface2); }
.ctx-sep { height:1px; background:var(--border); margin:3px 4px; }
.ctx-item.danger { color:var(--red); }

/* ── 이미지 플로팅 툴바 ── */
#imgToolbar { display:none; position:fixed; z-index:2500; background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:6px 10px; box-shadow:0 6px 24px rgba(0,0,0,.5); gap:6px; align-items:center; flex-wrap:wrap; font-size:12px; }
#imgToolbar.show { display:flex; }
#imgToolbar label { color:var(--text-muted); font-size:11px; white-space:nowrap; }
#imgWidthInput { width:54px; padding:3px 6px; background:var(--surface2); border:1px solid var(--border); border-radius:5px; color:var(--text); font-size:12px; text-align:center; outline:none; font-family:var(--font-main); }
#imgWidthInput:focus { border-color:var(--accent); }
#imgUnitSel,#imgAlignSel { padding:3px 6px; background:var(--surface2); border:1px solid var(--border); border-radius:5px; color:var(--text); font-size:12px; outline:none; font-family:var(--font-main); cursor:pointer; }

/* ── 표 그리드 ── */
#tableGrid { display:flex; flex-direction:column; gap:3px; margin:10px 0; }
.tg-row { display:flex; gap:3px; }
.tg-cell { width:24px; height:24px; border:1px solid var(--border); border-radius:3px; cursor:pointer; background:var(--surface2); transition:background .1s; }
.tg-cell.hov { background:rgba(212,188,150,.25); border-color:var(--accent); }

/* ── TOAST ── */
#wikiToast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(16px); z-index:5000; background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:10px 18px; font-size:13px; color:var(--text); box-shadow:0 8px 28px rgba(0,0,0,.4); opacity:0; transition:all .25s; pointer-events:none; white-space:nowrap; }
#wikiToast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.confirm-text { font-size:13px; color:var(--text); line-height:1.6; }

@media(max-width:768px) { #sidebar{width:200px;} .article-view-body{padding:18px 16px;} }
@media(max-width:560px) { #sidebar{display:none;} }
</style>
</head>
<body>

<!-- ═══ LOGIN OVERLAY ═══ -->
<div id="loginOverlay">
  <div class="login-box">
    <div class="login-title">📖 DRGO WIKI</div>
    <input class="login-input" type="text"     id="loginId" placeholder="아이디" autocomplete="username">
    <input class="login-input" type="password" id="loginPw" placeholder="비밀번호" autocomplete="current-password">
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" id="loginBtn">로그인</button>
  </div>
</div>

<!-- ═══ HEADER ═══ -->
<div id="wikiHeader">
  <div class="wiki-title"><span>📖</span><span>DRGO WIKI</span></div>
  <div class="header-right">
    <input type="text" id="searchInput" placeholder="🔍 제목 검색…">
    <div id="userBadge">
      <span>👤</span>
      <span class="badge-name" id="userNameDisplay"></span>
    </div>
    <button class="hdr-btn" id="logoutBtn" style="display:none;" onclick="doLogout()">로그아웃</button>
    <button class="hdr-btn primary" id="newArticleBtn">＋ 새 문서</button>
  </div>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="sidebar-section-header"><span id="articleCount">문서 목록</span></div>
    <div id="articleList"><div class="empty-list">📄 문서가 없습니다</div></div>
  </div>
  <div id="mainArea">
    <div id="wikiWelcome">
      <div class="welcome-big">WIKI</div>
      <div class="welcome-desc">좌측 목록에서 문서를 선택하거나 새 문서를 작성하세요</div>
    </div>
    <div id="articleView">
      <div class="article-view-header">
        <div class="article-view-category" id="viewCategory"></div>
        <div class="article-view-title" id="viewTitle"></div>
        <div class="article-view-meta" id="viewMeta"></div>
        <div class="article-view-actions">
          <button class="hdr-btn" id="editBtn">✏️ 편집</button>
          <button class="hdr-btn" id="deleteBtn" style="color:var(--red);border-color:var(--red);">🗑 삭제</button>
        </div>
      </div>
      <div class="article-view-body" id="viewBody"></div>
    </div>
  </div>
</div>

<!-- ═══ EDIT MODAL ═══ -->
<div class="modal-backdrop" id="editModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="editModalTitle">새 문서 작성</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyDnEOATYmwq0WJr6pCl-86-Q3ZEQjrrfeY",
  authDomain:"drgo-calender.firebaseapp.com", projectId:"drgo-calender",
  storageBucket:"drgo-calender.firebasestorage.app",
  messagingSenderId:"163730741115", appId:"1:163730741115:web:73a06d5b1cf1a477734fde"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const COL = 'wiki_articles';

/* ══ 헬퍼 ══ */
const $ = id => document.getElementById(id);
function toast(msg){ const t=$('wikiToast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function formatDate(ts){ if(!ts)return''; const d=ts.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function saveRange(){ const sel=window.getSelection(); if(sel&&sel.rangeCount>0) savedRange=sel.getRangeAt(0).cloneRange(); }
function restoreRange(){ if(!savedRange)return; const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(savedRange); }

/* ══ AUTH ══ */
const AUTH_KEY='cal_auth_ok', AUTH_UID='cal_auth_uid', AUTH_EXP='cal_auth_exp', AUTH_NAME='cal_auth_name';
const AUTH_TTL=30*24*60*60*1000;

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function isLoggedIn(){
  if(localStorage.getItem(AUTH_KEY)!=='1')return false;
  const exp=parseInt(localStorage.getItem(AUTH_EXP)||'0');
  if(Date.now()>exp){ clearAuth(); return false; }
  return true;
}
function clearAuth(){ [AUTH_KEY,AUTH_UID,AUTH_EXP,AUTH_NAME].forEach(k=>localStorage.removeItem(k)); }
function getDisplayName(){ return localStorage.getItem(AUTH_NAME)||localStorage.getItem(AUTH_UID)||''; }

function updateHeaderUser(){
  const name=getDisplayName();
  if(name && isLoggedIn()){
    $('userNameDisplay').textContent=name;
    $('userBadge').style.display='flex';
    $('logoutBtn').style.display='';
  } else {
    $('userBadge').style.display='none';
    $('logoutBtn').style.display='none';
  }
}

window.doLogout=function(){
  clearAuth();
  updateHeaderUser();
  $('loginOverlay').classList.add('show');
  // 목록/뷰 초기화
  $('articleView').classList.remove('show');
  $('wikiWelcome').style.display='';
  $('articleList').innerHTML='<div class="empty-list">📄 로그인이 필요합니다</div>';
};

/* 로그인 처리 */
async function tryLogin(){
  const userId=$('loginId').value.trim();
  const userPw=$('loginPw').value;
  const errEl=$('loginErr');
  errEl.textContent='';
  if(!userId){errEl.textContent='아이디를 입력하세요.';$('loginId').focus();return;}
  if(!userPw){errEl.textContent='비밀번호를 입력하세요.';$('loginPw').focus();return;}
  $('loginBtn').textContent='확인 중…'; $('loginBtn').disabled=true;
  try{
    const userDoc=await getDoc(doc(db,'users',userId));
    if(!userDoc.exists()){errEl.textContent='존재하지 않는 아이디입니다.';return;}
    const data=userDoc.data();
    const pwHash=await sha256(userPw);
    if(data.passwordHash!==pwHash){errEl.textContent='비밀번호가 올바르지 않습니다.';return;}
    // 성공
    const displayName=data.displayName||userId;
    localStorage.setItem(AUTH_KEY,'1');
    localStorage.setItem(AUTH_UID,userId);
    localStorage.setItem(AUTH_NAME,displayName);
    localStorage.setItem(AUTH_EXP,Date.now()+AUTH_TTL);
    $('loginOverlay').classList.remove('show');
    $('loginPw').value='';
    updateHeaderUser();
    await loadArticles();
  }catch(e){
    errEl.textContent='오류: '+e.message;
  }finally{
    $('loginBtn').textContent='로그인'; $('loginBtn').disabled=false;
  }
}
$('loginBtn').addEventListener('click',tryLogin);
['loginId','loginPw'].forEach(id=>$(id).addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();}));

/* ══ STATE ══ */
let articles=[], categories=new Set(['일반','운영','영업','기술']);
let selectedCat=null, currentId=null, editingId=null, searchQuery='';
let savedRange=null, selectedImg=null, ctxTargetCell=null;

/* ══ 데이터 로드 ══ */
async function loadArticles(){
  try{
    const snap=await getDocs(query(collection(db,COL),orderBy('createdAt','desc')));
    articles=snap.docs.map(d=>({id:d.id,...d.data()}));
    articles.forEach(a=>{if(a.category)categories.add(a.category);});
    renderList();
  }catch(e){console.error(e);toast('데이터 로드 실패');}
}

/* ══ 목록 렌더 ══ */
function renderList(){
  const list=$('articleList'), count=$('articleCount');
  let filtered=articles;
  if(searchQuery){const q=searchQuery.toLowerCase();filtered=filtered.filter(a=>a.title?.toLowerCase().includes(q)||a.category?.toLowerCase().includes(q));}
  count.textContent=`문서 ${filtered.length}건`;
  if(!filtered.length){list.innerHTML=`<div class="empty-list">${searchQuery?'🔍 검색 결과 없음':'📄 문서가 없습니다'}</div>`;return;}
  list.innerHTML=filtered.map(a=>`
    <div class="article-item${a.id===currentId?' active':''}" data-id="${a.id}">
      <div class="article-item-icon">📄</div>
      <div class="article-item-body">
        ${a.category?`<div class="article-item-cat">${escHtml(a.category)}</div>`:''}
        <div class="article-item-title">${escHtml(a.title||'(제목 없음)')}</div>
        <div class="article-item-meta">${formatDate(a.updatedAt||a.createdAt)}</div>
      </div>
    </div>`).join('');
  list.querySelectorAll('.article-item').forEach(el=>el.addEventListener('click',()=>openArticle(el.dataset.id)));
}

/* ══ 문서 열기 ══ */
function openArticle(id){
  const art=articles.find(a=>a.id===id); if(!art)return;
  currentId=id;
  $('wikiWelcome').style.display='none';
  $('articleView').classList.add('show');
  $('viewCategory').textContent=art.category||'';
  $('viewTitle').textContent=art.title||'';
  $('viewMeta').innerHTML=`<span>✏️ ${formatDate(art.updatedAt||art.createdAt)}</span>${art.author?`<span>👤 ${escHtml(art.author)}</span>`:''}`;
  $('viewBody').innerHTML=art.content||'';
  renderList();
}

/* ══ 에디터 모달 ══ */
const editorEl=$('articleEditor');

function openEditModal(id){
  if(!isLoggedIn()){toast('로그인이 필요합니다.');$('loginOverlay').classList.add('show');return;}
  editingId=id||null;
  const art=id?articles.find(a=>a.id===id):null;
  $('editModalTitle').textContent=art?'문서 편집':'새 문서 작성';
  $('articleTitle').value=art?.title||'';
  editorEl.innerHTML=art?.content||'';
  selectedCat=art?.category||null;
  renderCatChips();
  $('editModal').classList.add('open');
  hideImgToolbar(); deselectImg();
  setTimeout(()=>$('articleTitle').focus(),80);
  if(art?.content) setTimeout(bindExistingImages,100);
}
function closeEditModal(){
  $('editModal').classList.remove('open');
  hideImgToolbar(); deselectImg(); editingId=null;
}

/* ══ 카테고리 칩 ══ */
function renderCatChips(){
  const wrap=$('catChips');
  wrap.innerHTML=[...categories].map(c=>`<button class="cat-chip${c===selectedCat?' selected':''}" data-cat="${c}">${escHtml(c)}</button>`).join('')+
    `<button class="cat-chip" id="addCatChip" style="border-style:dashed;">＋ 추가</button>`;
  wrap.querySelectorAll('.cat-chip[data-cat]').forEach(btn=>btn.addEventListener('click',()=>{selectedCat=selectedCat===btn.dataset.cat?null:btn.dataset.cat;renderCatChips();}));
  $('addCatChip').addEventListener('click',()=>{const inp=$('newCatInput');inp.style.display=inp.style.display==='none'?'block':'none';if(inp.style.display!=='none')inp.focus();});
}
$('newCatInput').addEventListener('keydown',e=>{if(e.key==='Enter'){const v=e.target.value.trim();if(v){categories.add(v);selectedCat=v;renderCatChips();}e.target.value='';e.target.style.display='none';}});

/* ══ 툴바 ══ */
$('blockSel').addEventListener('change',e=>{editorEl.focus();document.execCommand('formatBlock',false,e.target.value);});

$('fontFamSel').addEventListener('change',e=>{
  const val=e.target.value; editorEl.focus(); restoreRange();
  if(!val)return;
  const sel=window.getSelection();
  if(!sel||sel.isCollapsed){e.target.selectedIndex=0;return;}
  wrapSelectionWithSpan({fontFamily:val});
  e.target.selectedIndex=0;
});

$('fontSizeInput').addEventListener('change',e=>{const sz=parseInt(e.target.value);if(sz>=6&&sz<=96)applyFontSize(sz+'px');});
$('fontSizeInput').addEventListener('keydown',e=>{if(e.key==='Enter'){const sz=parseInt(e.target.value);if(sz>=6&&sz<=96)applyFontSize(sz+'px');}});
$('fontSzQuick').addEventListener('change',e=>{if(e.target.value){$('fontSizeInput').value=e.target.value;applyFontSize(e.target.value+'px');}e.target.selectedIndex=0;});

function applyFontSize(size){editorEl.focus();restoreRange();const sel=window.getSelection();if(!sel||sel.isCollapsed)return;wrapSelectionWithSpan({fontSize:size});}

function wrapSelectionWithSpan(styles){
  const sel=window.getSelection();if(!sel||sel.rangeCount===0)return;
  const range=sel.getRangeAt(0);if(range.collapsed)return;
  const span=document.createElement('span');Object.assign(span.style,styles);
  try{range.surroundContents(span);}catch(e){const frag=range.extractContents();span.appendChild(frag);range.insertNode(span);}
  sel.removeAllRanges();const nr=document.createRange();nr.selectNodeContents(span);sel.addRange(nr);
}

document.querySelectorAll('.tb[data-cmd]').forEach(btn=>{
  btn.addEventListener('mousedown',e=>{e.preventDefault();editorEl.focus();document.execCommand(btn.dataset.cmd,false,null);syncToolbarState();});
});

$('fontColorInput').addEventListener('mousedown',saveRange);
$('fontColorInput').addEventListener('input',e=>{restoreRange();document.execCommand('foreColor',false,e.target.value);$('fontColorBar').style.background=e.target.value;});
$('bgColorInput').addEventListener('mousedown',saveRange);
$('bgColorInput').addEventListener('input',e=>{restoreRange();document.execCommand('hiliteColor',false,e.target.value);$('bgColorBar').style.background=e.target.value;});

function syncToolbarState(){
  ['bold','italic','underline','strikeThrough','insertUnorderedList','insertOrderedList',
   'justifyLeft','justifyCenter','justifyRight','justifyFull','superscript','subscript'].forEach(cmd=>{
    const b=document.querySelector(`.tb[data-cmd="${cmd}"]`);
    if(b)b.classList.toggle('act',document.queryCommandState(cmd));
  });
}
editorEl.addEventListener('keyup',syncToolbarState);
editorEl.addEventListener('mouseup',syncToolbarState);

/* ══ 표 삽입 ══ */
const GRID=8; let gridSelected={r:2,c:2};
function buildGrid(){
  const g=$('tableGrid');g.innerHTML='';
  for(let r=0;r<GRID;r++){
    const row=document.createElement('div');row.className='tg-row';
    for(let c=0;c<GRID;c++){const cell=document.createElement('div');cell.className='tg-cell';cell.dataset.r=r;cell.dataset.c=c;row.appendChild(cell);}
    g.appendChild(row);
  }
  let hrC=gridSelected.c,hrR=gridSelected.r; highlightGrid(hrR,hrC);
  g.querySelectorAll('.tg-cell').forEach(cell=>{
    cell.addEventListener('mouseover',()=>{hrR=+cell.dataset.r;hrC=+cell.dataset.c;highlightGrid(hrR,hrC);$('tGridLabel').textContent=`${hrR+1}행 × ${hrC+1}열`;});
    cell.addEventListener('click',()=>{gridSelected={r:hrR,c:hrC};$('tRows').value=hrR+1;$('tCols').value=hrC+1;$('tGridLabel').textContent=`${hrR+1}행 × ${hrC+1}열 선택됨 ✓`;});
  });
}
function highlightGrid(maxR,maxC){document.querySelectorAll('#tableGrid .tg-cell').forEach(c=>c.classList.toggle('hov',+c.dataset.r<=maxR&&+c.dataset.c<=maxC));}

$('tableBtn').addEventListener('click',()=>{saveRange();buildGrid();$('tableModal').classList.add('open');});
$('tableMClose').addEventListener('click',()=>$('tableModal').classList.remove('open'));
$('tableMCancel').addEventListener('click',()=>$('tableModal').classList.remove('open'));
$('tableInsert').addEventListener('click',()=>{
  const rows=parseInt($('tRows').value)||3, cols=parseInt($('tCols').value)||3;
  const hasHead=$('tHead').value==='1';
  const cs='border:1px solid #3a3a3a;padding:7px 10px;min-width:60px;';
  let html='<table style="border-collapse:collapse;width:100%;margin:10px 0;">';
  if(hasHead){html+='<thead><tr>';for(let c=0;c<cols;c++)html+=`<th style="${cs}background:rgba(212,188,150,.12);font-weight:600;">헤더${c+1}</th>`;html+='</tr></thead>';}
  html+='<tbody>';
  for(let r=0;r<rows;r++){html+='<tr>';for(let c=0;c<cols;c++)html+=`<td style="${cs}">내용</td>`;html+='</tr>';}
  html+='</tbody></table><p><br></p>';
  $('tableModal').classList.remove('open');editorEl.focus();restoreRange();
  document.execCommand('insertHTML',false,html);
});

/* 표 우클릭 메뉴 */
editorEl.addEventListener('contextmenu',e=>{
  const td=e.target.closest('td,th');if(!td){hideCtxMenu();return;}
  e.preventDefault();ctxTargetCell=td;
  const menu=$('tableCtxMenu');menu.style.left=e.clientX+'px';menu.style.top=e.clientY+'px';menu.classList.add('show');
});
document.addEventListener('click',e=>{if(!e.target.closest('#tableCtxMenu'))hideCtxMenu();});
function hideCtxMenu(){$('tableCtxMenu').classList.remove('show');}
$('tableCtxMenu').querySelectorAll('.ctx-item').forEach(item=>{
  item.addEventListener('click',()=>{
    const action=item.dataset.action, cell=ctxTargetCell; if(!cell)return;
    const row=cell.closest('tr'), table=cell.closest('table');
    const allRows=[...table.querySelectorAll('tr')];
    const rowIdx=allRows.indexOf(row), colIdx=[...row.children].indexOf(cell);
    const colCount=[...allRows[0].children].length;
    const cs='border:1px solid #3a3a3a;padding:7px 10px;min-width:60px;';
    if(action==='addRowAbove'||action==='addRowBelow'){
      const nr=document.createElement('tr');
      for(let i=0;i<colCount;i++){const td=document.createElement('td');td.style.cssText=cs;td.textContent=' ';nr.appendChild(td);}
      if(action==='addRowAbove')row.parentNode.insertBefore(nr,row);else row.insertAdjacentElement('afterend',nr);
    }else if(action==='addColLeft'||action==='addColRight'){
      allRows.forEach(r=>{const cells=[...r.children],ref=cells[colIdx],tag=r.closest('thead')?'th':'td';
        const nc=document.createElement(tag);nc.style.cssText=cs;
        if(tag==='th'){nc.style.background='rgba(212,188,150,.12)';nc.style.fontWeight='600';nc.textContent='헤더';}else nc.textContent=' ';
        if(action==='addColLeft')r.insertBefore(nc,ref);else ref.insertAdjacentElement('afterend',nc);
      });
    }else if(action==='deleteRow'){if(allRows.length<=1)table.remove();else row.remove();}
    else if(action==='deleteCol'){if(colCount<=1)table.remove();else allRows.forEach(r=>{const cells=[...r.children];if(cells[colIdx])cells[colIdx].remove();});}
    else if(action==='deleteTable')table.remove();
    hideCtxMenu();
  });
});

/* ══ 이미지 ══ */
$('imgInsertBtn').addEventListener('click',()=>{saveRange();$('imgFileInput').click();});
$('imgFileInput').addEventListener('change',async e=>{const files=Array.from(e.target.files);editorEl.focus();restoreRange();for(const f of files)await insertImgFile(f);e.target.value='';});
editorEl.addEventListener('dragover',e=>e.preventDefault());
editorEl.addEventListener('drop',async e=>{e.preventDefault();const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));for(const f of files)await insertImgFile(f);});
editorEl.addEventListener('paste',async e=>{const items=Array.from(e.clipboardData?.items||[]).filter(i=>i.type.startsWith('image/'));if(!items.length)return;e.preventDefault();for(const item of items){const f=item.getAsFile();if(f)await insertImgFile(f);}});

async function insertImgFile(file){
  return new Promise(resolve=>{
    const img0=new Image(),url0=URL.createObjectURL(file);
    img0.onload=()=>{
      const MAX=1600,Q=0.82;let w=img0.width,h=img0.height;
      if(w>MAX||h>MAX){if(w>=h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img0,0,0,w,h);URL.revokeObjectURL(url0);
      const src=canvas.toDataURL('image/jpeg',Q);
      const id='imgw_'+Date.now();
      const html=`<div class="img-resize-wrapper" id="${id}" contenteditable="false" style="width:100%;display:block;">
        <img src="${src}" style="width:100%;height:auto;display:block;border-radius:6px;border:2px solid transparent;" data-origw="${w}">
        <div class="resize-handle nw"></div><div class="resize-handle ne"></div>
        <div class="resize-handle sw"></div><div class="resize-handle se"></div>
      </div><p><br></p>`;
      document.execCommand('insertHTML',false,html);
      setTimeout(()=>{const w2=document.getElementById(id);if(w2)bindResizeHandles(w2);},50);
      resolve();
    };
    img0.src=url0;
  });
}

function bindResizeHandles(wrapper){
  if(wrapper.dataset.bound)return; wrapper.dataset.bound='1';
  const img=wrapper.querySelector('img');
  wrapper.addEventListener('click',e=>{if(e.target.classList.contains('resize-handle'))return;e.stopPropagation();selectImg(wrapper);});
  wrapper.querySelectorAll('.resize-handle').forEach(h=>{
    h.addEventListener('mousedown',e=>startResize(e,wrapper,h));
    h.addEventListener('touchstart',e=>startResizeTouch(e,wrapper,h),{passive:false});
  });
}
function startResize(e,wrapper,handle){
  e.preventDefault();e.stopPropagation();selectImg(wrapper);
  const startX=e.clientX,startW=wrapper.offsetWidth,isLeft=handle.classList.contains('nw')||handle.classList.contains('sw');
  const onMove=ev=>{const newW=Math.max(40,isLeft?startW-(ev.clientX-startX):startW+(ev.clientX-startX));wrapper.style.width=newW+'px';syncImgToolbar(wrapper);};
  const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
  document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
}
function startResizeTouch(e,wrapper,handle){
  e.preventDefault();e.stopPropagation();selectImg(wrapper);
  const startX=e.touches[0].clientX,startW=wrapper.offsetWidth,isLeft=handle.classList.contains('nw')||handle.classList.contains('sw');
  const onMove=ev=>{const newW=Math.max(40,isLeft?startW-(ev.touches[0].clientX-startX):startW+(ev.touches[0].clientX-startX));wrapper.style.width=newW+'px';syncImgToolbar(wrapper);};
  const onEnd=()=>{document.removeEventListener('touchmove',onMove);document.removeEventListener('touchend',onEnd);};
  document.addEventListener('touchmove',onMove,{passive:false});document.addEventListener('touchend',onEnd);
}

function selectImg(wrapper){deselectImg();selectedImg=wrapper;wrapper.classList.add('selected');showImgToolbar(wrapper);}
function deselectImg(){if(selectedImg){selectedImg.classList.remove('selected');selectedImg=null;}hideImgToolbar();}
editorEl.addEventListener('click',e=>{if(!e.target.closest('.img-resize-wrapper'))deselectImg();});

function showImgToolbar(wrapper){syncImgToolbar(wrapper);const r=$('articleEditor').getBoundingClientRect();$('imgToolbar').style.left=(r.left+8)+'px';$('imgToolbar').style.top=(r.bottom-52)+'px';$('imgToolbar').classList.add('show');}
function syncImgToolbar(wrapper){const sw=wrapper.style.width,isP=sw.endsWith('%'),v=parseInt(sw)||100;$('imgUnitSel').value=isP?'%':'px';$('imgWidthInput').value=v;const ml=wrapper.style.marginLeft,mr=wrapper.style.marginRight;if(ml==='auto'&&mr==='auto')$('imgAlignSel').value='center';else if(ml==='auto')$('imgAlignSel').value='right';else $('imgAlignSel').value='left';}
function hideImgToolbar(){$('imgToolbar').classList.remove('show');}
function applyImgSize(){if(!selectedImg)return;const val=parseInt($('imgWidthInput').value)||100,unit=$('imgUnitSel').value;selectedImg.style.width=val+unit;const align=$('imgAlignSel').value;selectedImg.style.display='block';if(align==='center'){selectedImg.style.marginLeft='auto';selectedImg.style.marginRight='auto';}else if(align==='right'){selectedImg.style.marginLeft='auto';selectedImg.style.marginRight='0';}else{selectedImg.style.marginLeft='0';selectedImg.style.marginRight='auto';}}
$('imgWidthInput').addEventListener('input',applyImgSize);
$('imgUnitSel').addEventListener('change',applyImgSize);
$('imgAlignSel').addEventListener('change',applyImgSize);
$('imgDoneBtn').addEventListener('click',deselectImg);
$('imgDeleteBtn').addEventListener('click',()=>{if(selectedImg){selectedImg.remove();deselectImg();}});

function bindExistingImages(){editorEl.querySelectorAll('.img-resize-wrapper').forEach(w=>{if(!w.dataset.bound)bindResizeHandles(w);});}

/* ══ 저장 ══ */
$('saveArticleBtn').addEventListener('click',saveArticle);
async function saveArticle(){
  const title=$('articleTitle').value.trim(), content=editorEl.innerHTML.trim();
  if(!title){toast('제목을 입력하세요');return;}
  if(!content){toast('내용을 입력하세요');return;}
  if(!isLoggedIn()){toast('로그인이 필요합니다');return;}
  // 닉네임(displayName) 사용
  const author=getDisplayName();
  const data={title,content,category:selectedCat||'일반',author,updatedAt:serverTimestamp()};
  try{
    if(editingId){await updateDoc(doc(db,COL,editingId),data);toast('문서가 수정되었습니다');}
    else{data.createdAt=serverTimestamp();const ref=await addDoc(collection(db,COL),data);editingId=ref.id;}
    closeEditModal();await loadArticles();openArticle(editingId);
  }catch(e){console.error(e);toast('저장 실패: '+e.message);}
}
